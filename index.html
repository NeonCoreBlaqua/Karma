<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neuro-Link HUD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="tablet" aria-label="Neuro-Link tablet interface">
    <header class="status-bar">
      <div class="brand">
        <span class="signal-dot"></span>
        <span>Neuro Wi-Fi</span>
      </div>
      <div class="status-icons" aria-label="Device status">
        <span class="bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span class="wifi" aria-hidden="true"></span>
        <span class="battery">100%</span>
      </div>
    </header>

    <section class="screen" id="screen" aria-live="polite">
      <section class="view active" data-view="home">
        <div class="wallpaper">
          <div class="lotus-mark" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="home-copy">
            <p class="eyebrow">Neuro-Link</p>
            <h1>Ready</h1>
            <p>Camden Falls life system online.</p>
          </div>
        </div>
      </section>

      <section class="view" data-view="profile">
        <div class="page-title">
          <p>Profile</p>
          <h2>Identity</h2>
        </div>
        <div class="info-grid">
          <article><span>Name</span><strong>Not set</strong></article>
          <article><span>Title</span><strong>Resident</strong></article>
          <article><span>Location</span><strong>Camden Falls</strong></article>
          <article><span>Sync</span><strong>Local</strong></article>
        </div>
      </section>

      <section class="view" data-view="wallet">
        <div class="page-title">
          <p>Wallet</p>
          <h2>G-Coin</h2>
        </div>
        <div class="balance-card">
          <span>Available Balance</span>
          <strong>GC 0</strong>
        </div>
        <div class="action-row">
          <button type="button">Send</button>
          <button type="button">Request</button>
          <button type="button">History</button>
        </div>
      </section>

      <section class="view" data-view="health">
        <div class="page-title">
          <p>Health</p>
          <h2>Status</h2>
        </div>
        <div class="meters">
          <label>Health <span></span></label>
          <label>Energy <span></span></label>
          <label>Hydration <span></span></label>
          <label>Mood <span></span></label>
        </div>
      </section>

      <section class="view" data-view="settings">
        <div class="page-title">
          <p>Settings</p>
          <h2>Controls</h2>
        </div>
        <div class="settings-list">
          <button type="button">Refresh Sync</button>
          <button type="button">Privacy</button>
          <button type="button">Display</button>
          <button type="button">About Neuro-Link</button>
        </div>
      </section>
    </section>

    <nav class="dock" aria-label="Neuro-Link apps">
      <button class="active" type="button" data-target="home">Home</button>
      <button type="button" data-target="profile">Profile</button>
      <button type="button" data-target="wallet">Wallet</button>
      <button type="button" data-target="health">Health</button>
      <button type="button" data-target="settings">Settings</button>
    </nav>
  </main>

  <script src="app.js"></script>
</body>
</html>
