<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neuro-Link Profile</title>
  <link rel="stylesheet" href="style.css?v=profile-readable-3">
</head>
<body>
  <main class="tablet" aria-label="Neuro-Link profile tablet">
    <section class="screen" id="screen">
      <header class="topbar">
        <img src="images/neuro logo.png" alt="">
        <div>
          <strong id="clock">--:-- --</strong>
          <span id="syncStatus">Profile bridge loading</span>
        </div>
        <button type="button" id="closeButton" data-profile-action="close" aria-label="Close profile">Close</button>
      </header>

      <section class="profile-view" id="profileView">
        <aside class="avatar-panel">
          <div class="avatar-frame">
            <img id="avatarImage" src="images/neuro logo.png" alt="">
            <div class="avatar-fallback" id="avatarFallback">NL</div>
          </div>
          <button type="button" data-profile-action="edit">Edit Profile</button>
          <button type="button" data-profile-action="refresh">Refresh</button>
        </aside>

        <section class="identity-panel">
          <p class="eyebrow">Profile</p>
          <h1 id="displayName">First Time Setup</h1>
          <div class="identity-grid">
            <article>
              <span>SL Username</span>
              <strong id="agentName">Loading</strong>
            </article>
            <article>
              <span>Title</span>
              <strong id="titleText">Resident</strong>
            </article>
            <article>
              <span>Location</span>
              <strong id="locationText">Camden Falls</strong>
            </article>
            <article>
              <span>Status</span>
              <strong id="statusText">Not synced</strong>
            </article>
          </div>
          <article class="bio-card">
            <span>About</span>
            <p id="bioText">Open setup to create this profile.</p>
          </article>
        </section>
      </section>

      <form class="profile-form hidden" id="profileForm">
        <div class="form-grid">
          <label>Display Name
            <input name="displayName" autocomplete="name" maxlength="40" required>
          </label>
          <label>Title
            <input name="title" autocomplete="off" maxlength="40" placeholder="Resident">
          </label>
          <label>Location
            <input name="location" autocomplete="off" maxlength="40" placeholder="Camden Falls">
          </label>
          <label>Avatar Image URL
            <input name="avatarUrl" autocomplete="off" placeholder="Optional image URL">
          </label>
          <label class="wide">About
            <textarea name="bio" rows="5" maxlength="420" placeholder="Write a short SL-style profile bio."></textarea>
          </label>
        </div>
        <footer class="form-actions">
          <button type="submit">Save</button>
          <button type="button" data-profile-action="refresh">Cancel</button>
          <button type="button" data-profile-action="reset">Reset Setup</button>
        </footer>
      </form>
    </section>
  </main>
  <script src="app.js?v=profile-readable-3"></script>
</body>
</html>
