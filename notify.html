<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neuro-Link Notifications</title>
  <link rel="stylesheet" href="notify.css?v=2">
</head>
<body>
  <main class="notify-bar" aria-label="Neuro-Link notification bar">
    <div class="brand">
      <img src="images/neuro logo.png" alt="">
    </div>
    <button class="notice" type="button" aria-label="Open notifications">
      <span class="bell" aria-hidden="true"></span>
      <span class="dot" aria-hidden="true"></span>
    </button>
    <div class="status">
      <span class="bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
      <span class="wifi" aria-hidden="true"></span>
      <span class="battery" aria-label="Battery full"></span>
    </div>
  </main>
</body>
</html>
